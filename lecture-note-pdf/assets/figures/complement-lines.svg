<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Complementary lines in the plane</title>
  <desc id="desc">Two lines through the origin span the plane and a vector is decomposed into components along each line.</desc>
  <rect width="900" height="420" fill="#fcfaf4"/>
  <g transform="translate(120 50)">
    <text x="310" y="28" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="28" font-weight="700" fill="#214d3a">Decomposing v = w + u</text>
    <line x1="0" y1="180" x2="620" y2="180" stroke="#6a6258" stroke-width="3"/>
    <line x1="310" y1="320" x2="310" y2="20" stroke="#6a6258" stroke-width="3"/>
    <line x1="80" y1="260" x2="540" y2="100" stroke="#214d3a" stroke-width="5"/>
    <line x1="40" y1="180" x2="580" y2="180" stroke="#8c4a21" stroke-width="5"/>
    <polyline points="310,180 450,180 520,132" fill="none" stroke="#305ea8" stroke-width="5"/>
    <circle cx="310" cy="180" r="7" fill="#1d1a17"/>
    <circle cx="520" cy="132" r="8" fill="#305ea8"/>
    <text x="533" y="128" font-family="Avenir Next, Arial, sans-serif" font-size="22" fill="#305ea8">v</text>
    <text x="428" y="166" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="20" fill="#8c4a21">w in W1</text>
    <text x="475" y="110" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="20" fill="#214d3a">u in W2</text>
    <text x="96" y="166" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="24" font-weight="700" fill="#8c4a21">W1</text>
    <text x="530" y="88" text-anchor="middle" font-family="Avenir Next, Arial, sans-serif" font-size="24" font-weight="700" fill="#214d3a">W2</text>
    <text x="328" y="172" font-family="Avenir Next, Arial, sans-serif" font-size="20" fill="#1d1a17">0</text>
  </g>
</svg>
